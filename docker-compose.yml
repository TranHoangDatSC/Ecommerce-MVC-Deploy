version: '3.8'
services:
  oldshop:
    build: 
      context: .
      dockerfile: DockerFile # Khớp với tên file bạn đang đặt
    container_name: oldshop_container
    ports:
      - "8000:8000"
    volumes:
      - ./sql_app.db:/code/sql_app.db
      - ./static:/code/static
      - ./app/static:/code/app/static
      - ./app/templates:/code/app/templates
    env_file:
      - .env
    restart: always